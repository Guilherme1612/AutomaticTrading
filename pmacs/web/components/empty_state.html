<!-- Empty state component (Source.md §13.4) -->
<!-- Usage: {% include "components/empty_state.html" %} -->
<!-- Context variables: empty_title, empty_message, empty_cta_text, empty_cta_action -->

<div class="flex flex-col items-center justify-center py-16 text-center">
    <div class="w-12 h-12 rounded-full bg-zinc-100 flex items-center justify-center mb-4">
        <svg class="w-6 h-6 text-zinc-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4"/>
        </svg>
    </div>
    <h3 class="text-base font-semibold text-zinc-900 mb-2">{{ empty_title | default("No data yet") }}</h3>
    <p class="text-sm text-zinc-500 max-w-sm mb-6">{{ empty_message | default("This section will populate once data is available.") }}</p>
    {% if empty_cta_text %}
    <button onclick="{{ empty_cta_action | default('') }}"
            class="px-4 py-2 text-sm bg-blue-600 text-white rounded hover:bg-blue-700 transition-colors">
        {{ empty_cta_text }}
    </button>
    {% endif %}
</div>
