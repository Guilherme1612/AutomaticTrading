# PMACS anti-pattern enforcement — pre-commit (commit time) + hookify (live Edit).
#
# Pre-commit (this file) fires on `git commit` from any tool (manual git, IDE,
# husky, etc.) and runs file-level exact-string greps. Hookify lives at
# `.claude/hookify.pmacs-anti-patterns.local.md` and fires on Claude Code's
# live Edit/Write/MultiEdit operations against `pmacs/*.py`, running a regex
# over the edited content.
#
# Pre-commit covers 6 patterns; hookify covers 5 (4 overlapping + 1 unique to
# hookify: `cycle_id=None` content-shape regex). Together they enforce 11
# distinct anti-patterns from `spec/Architecture.md §16` (see §16.15 for the
# full breakdown). They are COMPLEMENTARY, not duplicate — pre-commit wins on
# coverage (file-level greps over schemas/, secrets-in-logs), hookify wins on
# real-time feedback (fires before the operator stages the change).
#
# Both layers MUST stay wired. A clean working tree passes both.
#
# Hookify field-name gotcha (also documented in the rule file itself): the
# hookify rule engine maps `field: content` to BOTH `Write.content` AND
# `Edit.new_string`. Do NOT use `field: new_text` — it does not resolve for
# Edit operations. See `spec/Architecture.md §16.15` for rationale.
#
# Slash commands and skills live at `~/.claude/skills/pmacs-*/SKILL.md` and
# `.claude/commands/{gap-audit,design-scorecard,trace-cycle}.md`. See
# `spec/Source.md §27` for the full tooling surface.
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-added-large-files
        args: ['--maxkb=500']
      - id: check-merge-conflict

  - repo: local
    hooks:
      # Anti-pattern §16.1: No direct holding.state mutation outside state_machine.py
      - id: no-holding-state-mutation
        name: "Anti-pattern: no holding.state = outside state_machine.py"
        entry: 'bash -c "grep -rnP ''holding\.state\s*=(?!\s*=)'' --include=''*.py'' pmacs/ | grep -v ''state_machine\.py'' | grep -v ''__pycache__'' && exit 1 || exit 0"'
        language: system
        pass_filenames: false
        types: [python]

      # Anti-pattern: No json.dumps on audit payloads (must use canonical_json)
      - id: no-json-dumps-audit
        name: "Anti-pattern: no json.dumps in audit.py"
        entry: 'bash -c "grep -n ''json\.dumps'' pmacs/storage/audit.py && exit 1 || exit 0"'
        language: system
        pass_filenames: false
        types: [python]

      # Anti-pattern: No secrets in log output
      - id: no-secrets-in-logs
        name: "Anti-pattern: no secret logging"
        entry: bash -c "grep -rn 'api_key\|secret\|password\|token' --include='*.py' pmacs/ | grep -i 'log\|print\|debug' | grep -v 'error_code\|canonical\|# \|prompt_tokens\|completion_tokens\|max_tokens\|Keyring lookup' && exit 1 || exit 0"
        language: system
        pass_filenames: false
        types: [python]

      # Anti-pattern: No pydantic.v1 imports
      - id: no-pydantic-v1
        name: "Anti-pattern: no pydantic.v1 imports"
        entry: 'bash -c "grep -rn ''from pydantic\.v1'' --include=''*.py'' pmacs/ && exit 1 || exit 0"'
        language: system
        pass_filenames: false
        types: [python]

      # Anti-pattern: No class Config: (use model_config = ConfigDict)
      - id: no-class-config
        name: "Anti-pattern: no class Config: in Pydantic models"
        entry: 'bash -c "grep -rn ''class Config:'' --include=''*.py'' pmacs/schemas/ && exit 1 || exit 0"'
        language: system
        pass_filenames: false
        types: [python]

      # Anti-pattern §16.8: No eur_per_usd field declaration (must use usd_per_eur)
      - id: no-eur-per-usd-field
        name: "Anti-pattern: no eur_per_usd field declaration"
        entry: 'bash -c "grep -rn ''eur_per_usd:'' --include=''*.py'' pmacs/schemas/ | grep -v ''__pycache__'' && exit 1 || exit 0"'
        language: system
        pass_filenames: false
        types: [python]
