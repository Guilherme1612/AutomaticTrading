{# Wizard progress strip — Source.md §12.3
   Included in every wizard step template.
   Renders 11 dots: filled=zinc-400, current=blue-600, empty=zinc-700.

   Expects: current_step (int, 1-11)
#}
<div class="flex items-center justify-center gap-2 py-4" role="navigation" aria-label="Wizard progress">
    {% for i in range(1, 12) %}
    <div class="w-3 h-3 rounded-full transition-colors duration-200
        {% if i < current_step %}
            bg-zinc-400
        {% elif i == current_step %}
            bg-blue-600 ring-2 ring-blue-600 ring-offset-2 ring-offset-surface
        {% else %}
            bg-zinc-700
        {% endif %}"
        aria-label="Step {{ i }}{% if i < current_step %} completed{% elif i == current_step %} current{% endif %}"
        title="Step {{ i }}">
    </div>
    {% endfor %}
</div>
