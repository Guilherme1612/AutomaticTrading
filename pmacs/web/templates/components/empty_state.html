{# Empty state component — renders a placeholder when no data is available.

   Usage: {% include "components/empty_state.html" %}
   Context variables:
     empty_title   — required title text
     empty_message — required body message text
#}
<div class="empty-state anim-fade-in">
    <svg class="empty-state__icon" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4"/>
    </svg>
    <div class="empty-state__title">{{ empty_title }}</div>
    <p class="empty-state__message">{{ empty_message }}</p>
</div>
