{# Empty state component — renders a placeholder when no data is available.

Expects: empty_title (string), empty_message (string)
#}
<div class="text-center py-12 px-4 anim-fade-in">
    <div class="w-12 h-12 mx-auto mb-4 rounded-full bg-surface-sunken flex items-center justify-center">
        <svg class="w-6 h-6 text-text-muted" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4"/>
        </svg>
    </div>
    <div class="text-text-secondary text-sm font-medium mb-2">{{ empty_title }}</div>
    <p class="text-text-muted text-xs max-w-md mx-auto leading-relaxed">{{ empty_message }}</p>
</div>
