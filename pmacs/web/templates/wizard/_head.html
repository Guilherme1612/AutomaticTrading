{# Shared wizard head — full-screen setup wizard (Source.md §12.3)
   This is a stripped-down head that excludes the dashboard sidebar/top-nav
   but still loads the same design tokens, cache-busted assets, and theme
   support as the main app.
#}
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block wizard_title %}PMACS Setup Wizard{% endblock %}</title>
<link rel="stylesheet" href="/static/dist/tailwind.css?v=2">
<script src="/static/vendor/htmx.min.js"></script>
<link rel="stylesheet" href="/static/vendor/fonts/fonts.css">
<link rel="stylesheet" href="/static/style.css?v=6">
<style>
    /* Light + dark tokens — keep in sync with base.html §13.1 */
    :root {
        --surface: #f8fafc;
        --surface-elevated: #ffffff;
        --surface-sunken: #f1f5f9;
        --surface-overlay: #ffffff;
        --surface-glass: rgba(255,255,255,0.92);
        --border: #e2e8f0;
        --border-subtle: rgba(226,232,240,0.5);
        --border-strong: #cbd5e1;
        --text-primary: #0f172a;
        --text-secondary: #334155;
        --text-muted: #475569;
        --accent: #2563eb;
        --accent-text: #2563eb;
        --positive: #166534;
        --negative: #b91c1c;
        --negative-text: #b91c1c;
        --warning: #92400e;
        --strong-buy: #166534;
        --crucible: #7e22ce;
        --accent-soft: rgba(59,130,246,0.08);
        --accent-ring: rgba(59,130,246,0.25);
        --positive-soft: rgba(34,197,94,0.08);
        --negative-soft: rgba(239,68,68,0.08);
        --warning-soft: rgba(245,158,11,0.10);
        --crucible-soft: rgba(168,85,247,0.08);
        --viz-blue: #3b82f6;
        --viz-emerald: #10b981;
        --viz-amber: #f59e0b;
        --viz-rose: #f43f5e;
        --viz-violet: #8b5cf6;
        --viz-slate: #64748b;
    }
    .dark {
        --surface: #0c0f1a;
        --surface-elevated: rgba(30,35,52,0.75);
        --surface-sunken: #0a0d16;
        --surface-overlay: rgba(30,35,52,0.85);
        --surface-glass: rgba(30,35,52,0.55);
        --border: #1e293b;
        --border-subtle: rgba(30,41,59,0.5);
        --border-strong: #334155;
        --text-primary: #f1f5f9;
        --text-secondary: #cbd5e1;
        --text-muted: #94a3b8;
        --accent: #2563eb;
        --accent-text: #60a5fa;
        --positive: #4ade80;
        --negative: #b91c1c;
        --negative-text: #f87171;
        --warning: #fbbf24;
        --strong-buy: #16a34a;
        --crucible: #c084fc;
        --accent-soft: rgba(37,99,235,0.12);
        --accent-ring: rgba(37,99,235,0.3);
        --positive-soft: rgba(74,222,128,0.12);
        --negative-soft: rgba(185,28,28,0.12);
        --warning-soft: rgba(251,191,36,0.14);
        --crucible-soft: rgba(192,132,252,0.12);
        --viz-blue: #60a5fa;
        --viz-emerald: #34d399;
        --viz-amber: #fbbf24;
        --viz-rose: #fb7185;
        --viz-violet: #a78bfa;
        --viz-slate: #94a3b8;
    }
</style>
<script>
    /* Theme init — must run before body paint to avoid flash */
    (function() {
        var stored = localStorage.getItem('pmacs-theme');
        var prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
        var theme = stored || (prefersDark ? 'dark' : 'light');
        if (theme === 'dark') document.documentElement.classList.add('dark');
        else document.documentElement.classList.remove('dark');
    })();
</script>
