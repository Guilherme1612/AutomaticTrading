{# Wizard layout — full-screen, no sidebar, no top nav (Source.md §12.3)
   Steps 2-11 extend this layout. Step 1 is standalone (full HTML doc).
   Expects: current_step (int, 1-11)
#}
<!DOCTYPE html>
<html lang="en" class="h-full dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PMACS Setup Wizard &mdash; Step {{ current_step }}</title>
    <link rel="stylesheet" href="/static/dist/tailwind.css">
    <script src="/static/vendor/htmx.min.js"></script>
    <link rel="stylesheet" href="/static/vendor/fonts/fonts.css">
    <link rel="stylesheet" href="/static/style.css">
    <style>
        :root {
            --surface: #18181b;
            --surface-elevated: #27272a;
            --border: #3f3f46;
            --text-primary: #f4f4f5;
            --text-secondary: #d4d4d8;
            --text-muted: #a1a1aa;
            --accent: #60a5fa;
            --positive: #4ade80;
            --negative: #f87171;
            --warning: #fbbf24;
        }
    </style>
</head>
<body class="h-full bg-surface text-text-primary font-sans">
    <div class="min-h-screen flex flex-col">
        {% include "wizard/_progress.html" %}
        <div class="flex-1 flex items-center justify-center" id="wizard-content">
            {% block wizard_step %}{% endblock %}
        </div>
    </div>
</body>
</html>
