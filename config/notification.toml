# Notification levels per event category (Source.md §13.5, §20.2)
# Levels: "toast", "toast+sound", "modal", "none"

[cycle_start]
level = "toast"

[cycle_complete]
level = "toast"

[trade_filled_paper]
level = "toast"

[trade_filled_live]
level = "toast+sound"

[kill_switch_engaged]
level = "modal"  # Cannot be silenced (enforced server-side)

[audit_chain_failure]
level = "modal"  # Cannot be silenced (enforced server-side)

[stop_loss_triggered]
level = "toast+sound"

[mutation_candidate_ready]
level = "toast"

[mode_changed]
level = "toast+sound"

[demotion_triggered]
level = "toast+sound"

[persona_aborted]
level = "toast"

[mutation_approved]
level = "toast"

[disk_low]
level = "toast"  # warning, persistent

[reconciliation_mismatch]
level = "toast"  # warning, persistent

[source_degraded_important]
level = "toast"  # 30s duration

[source_degraded_nice_to_have]
level = "none"  # silent, Cortex page only

[source_recovered]
level = "toast"
