{# Reusable card partial. Usage: {% include "components/card.html" %} with card_title, card_id, card_class #}
<div class="bg-white border border-zinc-200 rounded-lg p-6 {{ card_class | default('') }}" id="{{ card_id | default('') }}">
    {% if card_title %}
    <div class="flex items-center justify-between mb-4">
        <h3 class="text-sm font-semibold text-zinc-900">{{ card_title }}</h3>
        {% block card_actions %}{% endblock %}
    </div>
    {% endif %}
    <div class="{% if card_title %}mt-2{% endif %}">
        {% block card_body %}{% endblock %}
    </div>
</div>
