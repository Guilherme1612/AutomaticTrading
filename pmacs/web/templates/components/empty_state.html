{# Empty state component — renders a placeholder when no data is available.

Expects: empty_title (string), empty_message (string)
#}
<div class="text-center py-8 px-4">
    <div class="text-zinc-400 text-sm font-medium mb-2">{{ empty_title }}</div>
    <p class="text-zinc-400 text-xs max-w-md mx-auto">{{ empty_message }}</p>
</div>
